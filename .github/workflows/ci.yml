name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check SPDX license headers
        run: |
          uv run python scripts/add_license_header.py --path src --types py --check
          uv run python scripts/add_license_header.py --path tests --types py --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # multicz validate needs the full history for tag detection
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate multicz.toml
        run: uv run multicz validate --strict

  test:
    needs: [license-headers, lint, validate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q
