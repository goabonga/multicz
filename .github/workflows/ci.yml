name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          # multicz validate / plan need the full history for tag detection
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q

      - name: Lint
        run: uv run ruff check src tests

      - name: Validate multicz.toml
        run: uv run multicz validate --strict
