name: release

# Self-hosted release pipeline: multicz manages multicz.
#
# What it does on every push to main:
#   1. validate the multicz config (CI gate)
#   2. plan the release (skip the rest if nothing pending)
#   3. bump pyproject.toml + CHANGELOG.md, commit, tag, push
#   4. build the wheel + sdist (uv build)
#   5. publish to PyPI via Trusted Publishing (OIDC, no token needed)
#   6. open a GitHub Release per new tag, with notes from
#      `multicz release-notes`
#
# Setup: configure PyPI trusted publishing for the repo
# (https://docs.pypi.org/trusted-publishers/) — no PYPI_TOKEN secret
# required. If you prefer token-based publishing, swap the
# pypa/gh-action-pypi-publish step for `uv publish` with
# `UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}`.
#
# Optional GPG signing: define repository secrets `GPG_PRIVATE_KEY`
# (ASCII-armored, e.g. `gpg --armor --export-secret-keys`) and
# `GPG_PASSPHRASE` to sign the release commit and tag. When either
# secret is missing the pipeline still runs, just unsigned.

on:
  push:
    branches: [main]

permissions:
  contents: write   # push the release commit and tags
  id-token: write   # OIDC claim for PyPI Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    # Don't loop on the chore(release) commit we just pushed.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release)') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install
        run: uv sync --frozen

      - name: Configure git
        # Attribute the release commit to whoever pushed the head commit,
        # so the chain "Bob pushed feat: X" -> "Bob authored chore(release):
        # bump X -> Y" is preserved on the timeline. Falls back to the
        # github-actions[bot] noreply identity when the trigger isn't
        # a push (manual dispatch, schedule, …).
        run: |
          NAME="${{ github.event.head_commit.author.name }}"
          EMAIL="${{ github.event.head_commit.author.email }}"
          git config user.name  "${NAME:-github-actions[bot]}"
          git config user.email "${EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"

      - name: Detect GPG availability
        # Secrets can't be referenced from `if:` directly, so we
        # promote their presence to a step output.
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import and unlock GPG key
        if: steps.gpg.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Pre-cache the passphrase in gpg-agent via a dummy sign so
          # subsequent `git commit -S` / `git tag -s` don't prompt.
          echo test | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            --pinentry-mode loopback --sign > /dev/null
          # Tell git which key to sign with — derived from the imported
          # key so we don't need a separate KEY_ID secret.
          KEY_ID=$(gpg --list-secret-keys --with-colons \
            | awk -F: '/^sec/{print $5; exit}')
          git config user.signingkey "$KEY_ID"

      - name: Validate
        run: uv run multicz validate --strict

      - name: Plan
        id: plan
        run: |
          uv run multicz plan --summary "$GITHUB_STEP_SUMMARY" \
            --output json | tee /tmp/plan.json
          if [ "$(jq '.bumps | length' /tmp/plan.json)" = "0" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "no release pending"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump, commit, tag, push (signed)
        if: steps.plan.outputs.release == 'true' && steps.gpg.outputs.available == 'true'
        run: |
          uv run multicz bump --commit --tag --push --sign \
            --summary "$GITHUB_STEP_SUMMARY" --output json \
            | tee /tmp/release.json

      - name: Bump, commit, tag, push
        if: steps.plan.outputs.release == 'true' && steps.gpg.outputs.available != 'true'
        run: |
          uv run multicz bump --commit --tag --push \
            --summary "$GITHUB_STEP_SUMMARY" --output json \
            | tee /tmp/release.json

      - name: Reinstall (pick up the new version)
        if: steps.plan.outputs.release == 'true'
        run: uv sync --frozen

      - name: Build wheel and sdist
        if: steps.plan.outputs.release == 'true'
        run: uv build

      - name: Publish to PyPI (Trusted Publishing via OIDC)
        if: steps.plan.outputs.release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: steps.plan.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tag in $(git tag --points-at HEAD); do
            uv run multicz release-notes --tag "$tag" \
              | gh release create "$tag" --title "$tag" --notes-file -
          done
