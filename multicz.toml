# multicz.toml — generated by `multicz init`
# https://github.com/goabonga/multicz

[project]
commit_convention = "conventional"
tag_format = "{component}-v{version}"
initial_version = "0.0.0"

[components.multicz]
paths = ["src/**", "pyproject.toml", "tests/**"]
bump_files = [
    {file = "pyproject.toml", key = "project.version"},
]
changelog = "CHANGELOG.md"
# Keep uv.lock in sync with pyproject.toml's new version, otherwise the
# next `uv sync --frozen` (CI) fails on lockfile drift.
post_bump = ["uv lock"]

[[components.multicz.artifacts]]
type = "pypi"
ref  = "multicz=={version}"

[[components.multicz.artifacts]]
type = "github-release"
ref  = "multicz-v{version}"
